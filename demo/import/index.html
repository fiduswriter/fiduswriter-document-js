<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>@fiduswriter/document — Import preview</title>
        <link rel="stylesheet" href="../css/fwtoolkit.css" />
        <link rel="stylesheet" href="../demo.css" />
        <link rel="icon" type="image/png" href="../favicon.png" />
    </head>
    <body>
        <main class="demo-container">
            <h1>Import preview</h1>
            <p>
                Drop a native <code>.fidus</code> file here to inspect the JSON
                it contains. No data is uploaded anywhere.
            </p>

            <div id="dropzone" class="demo-dropzone">
                Drop a <code>.fidus</code> file or click to select one.
            </div>
            <input type="file" id="file-input" accept=".fidus" hidden />

            <div id="result" style="margin-top: 1rem;"></div>

            <p><a href="../index.html">← Back to demos</a></p>
        </main>

        <script type="module" src="./index.js"></script>
    </body>
</html>
